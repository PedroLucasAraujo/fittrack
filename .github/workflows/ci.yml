name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: "Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install root dependencies
        run: npm install --ignore-scripts

      - name: Check formatting
        run: npx prettier --check "packages/**/*.ts"

      - name: Lint
        run: npx eslint packages/

  test-core:
    name: "Test @fittrack/core"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --ignore-scripts
        working-directory: packages/core

      - name: Run tests with coverage
        run: npx vitest run --coverage
        working-directory: packages/core

  test-identity:
    name: "Test @fittrack/identity"
    runs-on: ubuntu-latest
    needs: test-core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install core dependency
        run: npm install --ignore-scripts
        working-directory: packages/core

      - name: Install identity dependencies
        run: npm install --ignore-scripts
        working-directory: packages/identity

      - name: Run tests with coverage
        run: npx vitest run --coverage
        working-directory: packages/identity

  typecheck-core:
